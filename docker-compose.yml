version: '3.8'

volumes:
  pgdata:
  uploads:

services:
  postgres:
    image: postgres:16-alpine
    container_name: bakery-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: reposteria
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Variable DB_PASSWORD requerida}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/migrations/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/migrations/migrate-002.sql:/docker-entrypoint-initdb.d/02-migrate.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bakery-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: reposteria
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:?Variable DB_PASSWORD requerida}
      JWT_SECRET: ${JWT_SECRET:?Variable JWT_SECRET requerida}
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: https://${DOMAIN:-localhost}
      API_URL: http://backend:3000
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      WOMPI_API_URL: ${WOMPI_API_URL:-https://sandbox.wompi.co/v1}
      WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY:-}
      WOMPI_PRIVATE_KEY: ${WOMPI_PRIVATE_KEY:-}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./bakery-frontend
      dockerfile: Dockerfile
    container_name: bakery-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${SSL_CERT_DIR:-./certs}:/etc/ssl/certs:ro
      - ${SSL_KEY_DIR:-./certs}:/etc/ssl/private:ro
    environment:
      DOMAIN: ${DOMAIN:-localhost}
