name: Deploy Bakery Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and Build Frontend
        working-directory: ./bakery-frontend
        run: |
          npm install
          npm run build -- --configuration=production

      - name: Copy Frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "bakery-frontend/dist/bakery-frontend/browser/*"
          target: "/var/www/seminario1/bakery/"
          strip_components: 4
