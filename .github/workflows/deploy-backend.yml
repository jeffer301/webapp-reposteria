name: Deploy Backend

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - 'docker-compose.vps.yml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Copiar archivos al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "backend/,docker-compose.vps.yml"
          target: "/var/www/seminario1/bakery"
          strip_components: 0
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          request_pty: true
          script: |
            set -e

            if [ -d "/var/www/seminario1/bakery/webapp-reposteria" ]; then
              cp -r /var/www/seminario1/bakery/webapp-reposteria/* /var/www/seminario1/bakery/
              rm -rf /var/www/seminario1/bakery/webapp-reposteria
            fi

            cd /var/www/seminario1/bakery

            cat <<ENVEOF > .env
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            DOMAIN="bakery.seminario1.eleueleo.com"
            ENVEOF

            chmod 600 .env

            # Cargar entorno completo de Docker Rootless
            export PATH=$HOME/bin:$HOME/.local/bin:$PATH
            export DOCKER_HOST=unix://$HOME/.docker/run/docker.sock
            export XDG_RUNTIME_DIR=/run/user/$(id -u)

            echo "UID: $(id -u)"
            echo "DOCKER_HOST: $DOCKER_HOST"
            echo "XDG_RUNTIME_DIR: $XDG_RUNTIME_DIR"
            docker info | head -5

            # Solo tocar los contenedores propios de este servicio (backend + db).
            # NO tocar bakery-web: eso es responsabilidad del workflow de frontend.
            docker rm -f bakery-db bakery-api 2>/dev/null || true
            docker compose -f docker-compose.vps.yml up -d --build backend postgres
            docker image prune -f

            # Esperar a que PostgreSQL esté listo
            echo "Esperando a que PostgreSQL esté healthy..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.vps.yml exec -T postgres pg_isready -U postgres > /dev/null 2>&1; then
                echo "PostgreSQL listo"
                break
              fi
              sleep 2
            done

            # Ejecutar migraciones (schema.sql + migrate-*.sql)
            echo "Ejecutando migraciones..."
            docker compose -f docker-compose.vps.yml exec -T backend node src/migrations/run.js || {
              echo "⚠️  Error en migraciones, pero continuando..."
            }

            echo "Backend desplegado en puerto 9001"
