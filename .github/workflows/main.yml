name: Deploy Bakery Project

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configurar Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. Instalar dependencias y compilar el Frontend (Moviéndonos a bakery-frontend)
    - name: Install and Build Frontend
      working-directory: ./bakery-frontend
      run: |
        npm install
        npm run build -- --configuration=production

    # 4. Subir los archivos compilados al VPS
    - name: Copy Frontend to VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        # Apuntamos a la carpeta de salida real dentro de bakery-frontend
        source: "bakery-frontend/dist/webapp-reposteria/*"
        target: "/var/www/seminario1/bakery/"
        strip_components: 3 # Elimina 'bakery-frontend/dist/webapp-reposteria' para dejar los archivos sueltos en el destino
